<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Safety Briefing</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    margin-top: 40px;
    background: #f5f5f5;
}

video{
    width: 90%;
    max-width: 800px;
}

#continueBtn{
    display: none;
    padding: 15px 25px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1 id="title"></h1>
<p id="instruction"></p>

<video id="video" controls controlsList="nodownload noplaybackrate"></video>

<br>

<button id="continueBtn">Continue</button>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const lang = params.get('lang') || 'en';

    const content = {
        en: {
            title: "Safety Briefing",
            instruction: "Please watch the full safety video.",
            video: "https://www.dropbox.com/scl/fi/ahgbzy8uprzm8tttnb2qk/cfm_sicherheitunterweisung_en.mov?raw=1"
        },
        de: {
            title: "Sicherheitseinweisung",
            instruction: "Bitte sehen Sie das vollständige Video an.",
            video: "https://www.dropbox.com/scl/fi/lrtu0p2kzim4b3vpw9vsj/cfm_sicherheitunterweisung_de.mov?raw=1"
        },
        fr: {
            title: "Consignes de sécurité",
            instruction: "Veuillez regarder la vidéo complète.",
            video: "https://www.dropbox.com/scl/fi/7ax39vdy52jrm0dzblmax/cfm_sicherheitunterweisung_fr.mov?raw=1"
        },
        es: {
            title: "Instrucciones de seguridad",
            instruction: "Vea el video completo.",
            video: "https://www.dropbox.com/scl/fi/j4g4614n8ynwwn1089g4v/cfm_sicherheitunterweisung_esp.mov?raw=1"
        },
        ru: {
            title: "Инструктаж",
            instruction: "Посмотрите видео полностью.",
            video: "https://www.dropbox.com/scl/fi/h7jn26rw73p80s0bdd4fo/cfm_sicherheitunterweisung_ru.mov?raw=1"
        },
        hu: {
            title: "Biztonsági tájékoztató",
            instruction: "Nézze végig a videót.",
            video: "https://www.dropbox.com/scl/fi/r7f164fetfkgv2y1tfi29/cfm_sicherheitunterweisung_hu.mov?raw=1"
        },
        tr: {
            title: "Güvenlik Talimatı",
            instruction: "Videonun tamamını izleyin.",
            video: "https://www.dropbox.com/scl/fi/z8lgjx0069yi9ha3b9zge/cfm_sicherheitunterweisung_tu.mov?raw=1"
        }
    };

    const data = content[lang] || content.en;

    document.getElementById("title").innerText = data.title;
    document.getElementById("instruction").innerText = data.instruction;

    const video = document.getElementById("video");
    const btn = document.getElementById("continueBtn");

    video.src = data.video;

    let maxTime = 0;

    video.addEventListener("timeupdate", () => {
        if(video.currentTime > maxTime){
            maxTime = video.currentTime;
        }
    });

    video.addEventListener("seeking", () => {
        if(video.currentTime > maxTime + 1){
            video.currentTime = maxTime;
        }
    });

    video.addEventListener("ended", () => {
        btn.style.display = "inline-block";
    });

    btn.onclick = () => {
        window.location.href =
        "https://b6mzfrmb.forms.app/willkommen-2?lang=" + lang;
    };

});

</script>

</body>
</html>
