<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Safety Briefing</title>

<style>
body{
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
    padding: 40px;
}

/* container keeps everything aligned */
.wrapper{
    max-width: 900px;
    margin: auto;
}

/* TEXT ABOVE VIDEO (left aligned) */
#title, #instruction{
    text-align: left;
}

/* video full width block */
video{
    width: 100%;
    margin-top: 20px;
    background: black;
}

/* buttons under video */
.buttons{
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

button{
    padding: 12px 18px;
    font-size: 16px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="wrapper">

    <h1 id="title"></h1>
    <p id="instruction"></p>

    <video id="video" controls controlsList="nodownload noplaybackrate"></video>

    <div class="buttons">
        <button id="backBtn"></button>
        <button id="continueBtn" style="display:none;"></button>
    </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const lang = params.get("lang") || "en";

    const content = {
        en: {
            title: "Safety Briefing",
            instruction: "Please watch the full safety video.",
            back: "Back",
            continue: "Continue",
            video: "https://www.dropbox.com/scl/fi/5125ual5wwbyo0f39pdb1/cfm_sicherheitunterweisung_en.mp4?raw=1"
        },
        de: {
            title: "Sicherheitseinweisung",
            instruction: "Bitte vollständiges Video ansehen.",
            back: "Zurück",
            continue: "Weiter",
            video: "https://www.dropbox.com/scl/fi/ap2p8ymm96660xcuz85g0/cfm_sicherheitunterweisung_de.mp4?raw=1"
        },
        fr: {
            title: "Consignes de sécurité",
            instruction: "Veuillez regarder la vidéo complète.",
            back: "Retour",
            continue: "Continuer",
            video: "https://www.dropbox.com/scl/fi/930qstnqbesom1xv8yoao/cfm_sicherheitunterweisung_fr.mp4?raw=1"
        },
        es: {
            title: "Instrucciones de seguridad",
            instruction: "Vea el video completo.",
            back: "Atrás",
            continue: "Continuar",
            video: "https://www.dropbox.com/scl/fi/fvptb7prmw7algpt6g026/cfm_sicherheitunterweisung_esp.mp4?raw=1"
        },
        ru: {
            title: "Инструктаж",
            instruction: "Посмотрите видео полностью.",
            back: "Назад",
            continue: "Далее",
            video: "https://www.dropbox.com/scl/fi/s37a9uweq2tlyvepfub0u/cfm_sicherheitunterweisung_ru.mp4?raw=1"
        },
        hu: {
            title: "Biztonsági tájékoztató",
            instruction: "Nézze végig a videót.",
            back: "Vissza",
            continue: "Tovább",
            video: "https://www.dropbox.com/scl/fi/wjnjywu7b4but94k6v59p/cfm_sicherheitunterweisung_hu.mp4?raw=1"
        },
        tr: {
            title: "Güvenlik Talimatı",
            instruction: "Videonun tamamını izleyin.",
            back: "Geri",
            continue: "Devam",
            video: "https://www.dropbox. com/scl/fi/zjje1xx7yhg2scngwvbor/cfm_sicherheitunterweisung_tu.mp4?raw=1"
        }
    };

    const data = content[lang] || content.en;

    document.getElementById("title").innerText = data.title;
    document.getElementById("instruction").innerText = data.instruction;

    const video = document.getElementById("video");
    video.src = data.video;

    const backBtn = document.getElementById("backBtn");
    const continueBtn = document.getElementById("continueBtn");

    backBtn.innerText = data.back;
    continueBtn.innerText = data.continue;

    backBtn.onclick = () => history.back();

    continueBtn.onclick = () => {
        window.location.href =
        "https://b6mzfrmb.forms.app/willkommen-2?lang=" + lang;
    };

    // fallback unlock (reliable)
    setTimeout(() => {
        continueBtn.style.display = "inline-block";
    }, 30000);

});

</script>

</body>
</html>
