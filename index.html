<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Safety Briefing</title>

<style>
body{
font-family:Inter;
text-align:center;
margin-top:40px;
background:#f5f5f5;
}

video{
max-width:90%;
}

#continueBtn{
display:none;
padding:15px 25px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<h1 id="title"></h1>
<p id="instruction"></p>

<video
id="video"
controls
controlsList="nodownload noplaybackrate"
disablePictureInPicture
></video>

<br><br>

<button id="continueBtn">→</button>

<script>

const params = new URLSearchParams(window.location.search);
const lang = params.get('lang') || 'en';

const content = {

en: {
title: 'Safety Briefing',
instruction: 'Please watch the full safety video.',
video: 'https://drive.google.com/uc?export=download&id=1Bbqnpqm6wPz0ILXFvrdcXq6bUIVhRBBs'
},

de: {
title: 'Sicherheitseinweisung',
instruction: 'Bitte sehen Sie das vollständige Video an.',
video: 'https://drive.google.com/uc?export=download&id=1l57Uj_Cwzkkh38wr8NqWF2jgGpg3JeTG'
},

fr: {
title: 'Consignes de sécurité',
instruction: 'Veuillez regarder la vidéo complète.',
video: 'https://drive.google.com/uc?export=download&id=1qzyoaPwNX1hOWI-OzHwIl6vu4D31g07Y'
},

es: {
title: 'Instrucciones de seguridad',
instruction: 'Por favor vea el video completo.',
video: 'https://drive.google.com/uc?export=download&id=1XRE9YreI1MfmtRmXqc57gy0uEFQG9uI8'
},

ru: {
title: 'Инструктаж по технике безопасности',
instruction: 'Пожалуйста, посмотрите видео полностью.',
video: 'https://drive.google.com/uc?export=download&id=1ZuryeSXlpL_PbDja0uxnwnDgjYVh0VZ-'
},

hu: {
title: 'Biztonsági tájékoztató',
instruction: 'Kérjük, nézze végig a videót.',
video: 'https://drive.google.com/uc?export=download&id=14AJopHOqmMXjCD4FThpSkXxMxSVrViVZ'
},

tr: {
title: 'Güvenlik Talimatı',
instruction: 'Lütfen videonun tamamını izleyin.',
video: 'https://drive.google.com/uc?export=download&id=1dB0LT1yk3Jxo9peKLviUKJZq9Zjtr3F0'
}

};

document.getElementById('title').innerText = content[lang].title;
document.getElementById('instruction').innerText = content[lang].instruction;

const video = document.getElementById('video');
video.src = content[lang].video;

let maxTime = 0;

video.addEventListener('timeupdate', () => {
if(video.currentTime > maxTime){
maxTime = video.currentTime;
}
});

video.addEventListener('seeking', () => {
if(video.currentTime > maxTime + 1){
video.currentTime = maxTime;
}
});

video.addEventListener('ratechange', () => {
video.playbackRate = 1;
});

video.addEventListener('ended', () => {
document.getElementById('continueBtn').style.display = 'inline-block';
});

document.getElementById('continueBtn').onclick = () => {
window.location.href =
'https://b6mzfrmb.forms.app/willkommen-2?lang=' + lang;
};

</script>

</body>
</html>
