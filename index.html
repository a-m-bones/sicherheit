<body>

<div class="container">

    <div class="left">

        <h1 id="title"></h1>
        <p id="instruction"></p>

        <button id="backBtn"></button>

    </div>

    <div class="right">

        <video id="video" controls controlsList="nodownload noplaybackrate"></video>

        <div class="buttons">

            <button id="continueBtn"></button>

        </div>

    </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const lang = params.get('lang') || 'en';

    const content = {

        en: {
            title: "Safety Briefing",
            instruction: "Please watch the full safety video.",
            continue: "Continue",
            back: "Back",
            video: "https://www.dropbox.com/scl/fi/ahgbzy8uprzm8tttnb2qk/cfm_sicherheitunterweisung_en.mov?raw=1"
        },

        de: {
            title: "Sicherheitseinweisung",
            instruction: "Bitte sehen Sie das vollständige Video an.",
            continue: "Weiter",
            back: "Zurück",
            video: "https://www.dropbox.com/scl/fi/lrtu0p2kzim4b3vpw9vsj/cfm_sicherheitunterweisung_de.mov?raw=1"
        },

        fr: {
            title: "Consignes de sécurité",
            instruction: "Veuillez regarder la vidéo complète.",
            continue: "Continuer",
            back: "Retour",
            video: "https://www.dropbox.com/scl/fi/7ax39vdy52jrm0dzblmax/cfm_sicherheitunterweisung_fr.mov?raw=1"
        },

        es: {
            title: "Instrucciones de seguridad",
            instruction: "Vea el video completo.",
            continue: "Continuar",
            back: "Atrás",
            video: "https://www.dropbox.com/scl/fi/j4g4614n8ynwwn1o89g4v/cfm_sicherheitunterweisung_esp.mov?raw=1"
        },

        ru: {
            title: "Инструктаж",
            instruction: "Посмотрите видео полностью.",
            continue: "Далее",
            back: "Назад",
            video: "https://www.dropbox.com/scl/fi/h7jn26rw73p80s0bdd4fo/cfm_sicherheitunterweisung_ru.mov?raw=1"
        },

        hu: {
            title: "Biztonsági tájékoztató",
            instruction: "Nézze végig a videót.",
            continue: "Tovább",
            back: "Vissza",
            video: "https://www.dropbox.com/scl/fi/r7f164fetfkgv2y1tfi29/cfm_sicherheitunterweisung_hu.mov?raw=1"
        },

        tr: {
            title: "Güvenlik Talimatı",
            instruction: "Videonun tamamını izleyin.",
            continue: "Devam",
            back: "Geri",
            video: "https://www.dropbox.com/scl/fi/z8lgjx0069yi9ha3b9zge/cfm_sicherheitunterweisung_tu.mov?raw=1"
        }

    };

    const data = content[lang] || content.en;

    document.getElementById("title").innerText = data.title;
    document.getElementById("instruction").innerText = data.instruction;

    const video = document.getElementById("video");
    video.src = data.video;

    const continueBtn = document.getElementById("continueBtn");
    const backBtn = document.getElementById("backBtn");

    continueBtn.innerText = data.continue;
    backBtn.innerText = data.back;

    continueBtn.onclick = () => {
        window.location.href =
        "https://b6mzfrmb.forms.app/willkommen-2?lang=" + lang;
    };

    backBtn.onclick = () => {
        window.history.back();
    };

    // unlock continue button after time (safe fallback)
    setTimeout(() => {
        continueBtn.style.display = "inline-block";
    }, 25000);

});

</script>

<style>

body{
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

.container{
    display: flex;
    padding: 40px;
    gap: 40px;
}

/* LEFT SIDE */
.left{
    width: 35%;
}

.left h1{
    margin-top: 0;
}

/* RIGHT SIDE */
.right{
    width: 65%;
}

video{
    width: 100%;
    max-width: 800px;
    background: black;
}

/* BUTTONS */
.buttons{
    display: flex;
    justify-content: flex-end;
    margin-top: 15px;
    gap: 10px;
}

button{
    padding: 12px 20px;
    font-size: 16px;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 900px){
    .container{
        flex-direction: column;
    }

    .left, .right{
        width: 100%;
    }

    .buttons{
        justify-content: center;
    }
}

</style>

</body>
