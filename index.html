<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Safety Briefing</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 40px;
    background: #f5f5f5;
}

iframe{
    width: 90%;
    max-width: 800px;
    height: 450px;
}

#continueBtn{
    display: none;
    padding: 15px 25px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1 id="title">Loading...</h1>
<p id="instruction"></p>

<iframe id="player" frameborder="0" allowfullscreen></iframe>

<br>

<button id="continueBtn">Continue</button>

<script>

window.addEventListener("DOMContentLoaded", function () {

    const params = new URLSearchParams(window.location.search);
    const lang = params.get('lang') || 'en';

    const content = {
        en: {
            title: "Safety Briefing",
            instruction: "Please watch the full safety video.",
            video: "https://www.youtube.com/embed/lXsjboFLr_A"
        },
        de: {
            title: "Sicherheitseinweisung",
            instruction: "Bitte sehen Sie das vollständige Video an.",
            video: "https://www.youtube.com/embed/zabzR1QZQiM"
        },
        fr: {
            title: "Consignes de sécurité",
            instruction: "Veuillez regarder la vidéo complète.",
            video: "https://www.youtube.com/embed/_RtmOEpPGrc"
        },
        es: {
            title: "Instrucciones de seguridad",
            instruction: "Por favor vea el video completo.",
            video: "https://www.youtube.com/embed/ipcUs1_eFEI"
        },
        ru: {
            title: "Инструктаж по технике безопасности",
            instruction: "Пожалуйста, посмотрите видео полностью.",
            video: "https://www.youtube.com/embed/ZiIve6djYUY"
        },
        hu: {
            title: "Biztonsági tájékoztató",
            instruction: "Kérjük, nézze végig a videót.",
            video: "https://www.youtube.com/embed/3gCpkY8OcXc"
        },
        tr: {
            title: "Güvenlik Talimatı",
            instruction: "Lütfen videonun tamamını izleyin.",
            video: "https://www.youtube.com/embed/qV39k-8rskg"
        }
    };

    const selected = content[lang] || content.en;

    document.getElementById("title").innerText = selected.title;
    document.getElementById("instruction").innerText = selected.instruction;
    document.getElementById("player").src = selected.video;

    const btn = document.getElementById("continueBtn");

    // SAFE fallback (reliable in all browsers)
    setTimeout(() => {
        btn.style.display = "inline-block";
    }, 25000);

    btn.onclick = () => {
        window.location.href =
        "https://b6mzfrmb.forms.app/willkommen-2?lang=" + lang;
    };

});

</script>

</body>
</html>
