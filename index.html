<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Safety Briefing</title>

<style>
body{
    font-family: Inter;
    background: #f5f5f5;
    margin: 0;
    padding: 40px;
}

/* container */
.wrapper{
    max-width: 900px;
    margin: auto;
}

/* text */
#title, #instruction{
    text-align: left;
}

/* video */
video{
    width: 100%;
    margin-top: 20px;
    background: black;
}

/* buttons layout */
.buttons{
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

/* BUTTON STYLE (fixed) */
button{
    padding: 12px 18px;
    font-size: 16px;
    cursor: pointer;
    background-color: #d02c22;
    color: white;
    border: none;
    outline: none;
    border-radius: 4px;
}

button:hover{
    opacity: 0.9;
}

button:focus{
    outline: none;
}
</style>
</head>

<body>

<div class="wrapper">

    <h1 id="title"></h1>
    <p id="instruction"></p>

    <!-- controls enabled, JS prevents skipping -->
    <video id="video" controls playsinline></video>

    <div class="buttons">
        <button id="backBtn"></button>
        <button id="continueBtn" style="display:none;"></button>
    </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const lang = params.get("lang") || "en";

    const content = {
        en: {
            title: "Safety Briefing",
            instruction: "Please watch the full safety video.",
            back: "Back",
            continue: "Continue",
            video: "https://res.cloudinary.com/dt0u20yez/video/upload/v1778247758/cfm_sicherheitunterweisung_en_prlc6d.mp4"
        },
        de: {
            title: "Sicherheitseinweisung",
            instruction: "Bitte vollständiges Video ansehen.",
            back: "Zurück",
            continue: "Weiter",
            video: "https://res.cloudinary.com/dt0u20yez/video/upload/v1778250995/cfm_sicherheitunterweisung_de_gqtjuy.mp4"
        },
        fr: {
            title: "Consignes de sécurité",
            instruction: "Veuillez regarder la vidéo complète.",
            back: "Retour",
            continue: "Continuer",
            video: "https://res.cloudinary.com/dt0u20yez/video/upload/v1778250982/cfm_sicherheitunterweisung_fr_llw8bp.mp4"
        },
        es: {
            title: "Instrucciones de seguridad",
            instruction: "Vea el video completo.",
            back: "Atrás",
            continue: "Continuar",
            video: "https://res.cloudinary.com/dt0u20yez/video/upload/v1778250992/cfm_sicherheitunterweisung_esp_ul0bqo.mp4"
        },
        ru: {
            title: "Инструктаж",
            instruction: "Посмотрите видео полностью.",
            back: "Назад",
            continue: "Далее",
            video: "https://res.cloudinary.com/dt0u20yez/video/upload/v1778250995/cfm_sicherheitunterweisung_ru_jnuuc5.mp4"
        },
        hu: {
            title: "Biztonsági tájékoztató",
            instruction: "Nézze végig a videót.",
            back: "Vissza",
            continue: "Tovább",
            video: "https://res.cloudinary.com/dt0u20yez/video/upload/v1778250992/cfm_sicherheitunterweisung_hu_xpldff.mp4"
        },
        tr: {
            title: "Güvenlik Talimatı",
            instruction: "Videonun tamamını izleyin.",
            back: "Geri",
            continue: "Devam",
            video: "https://res.cloudinary.com/dt0u20yez/video/upload/v1778250987/cfm_sicherheitunterweisung_tu_hhpghe.mp4"
        }
    };

    const data = content[lang] || content.en;

    document.getElementById("title").innerText = data.title;
    document.getElementById("instruction").innerText = data.instruction;

    const video = document.getElementById("video");
    const backBtn = document.getElementById("backBtn");
    const continueBtn = document.getElementById("continueBtn");

    video.src = data.video;

    backBtn.innerText = data.back;
    continueBtn.innerText = data.continue;

    backBtn.onclick = () => history.back();

   continueBtn.onclick = () => {
    window.location.href =
    "https://show.forms.app/cfmaier/willkommen-2#69fdf93a41da93a1c819d2bb=" + lang;
};

    // unlock at end
    video.addEventListener("ended", () => {
        continueBtn.style.display = "inline-block";
    });

 let maxTime = 0;

video.addEventListener("loadedmetadata", () => {
    maxTime = 0;
});

video.addEventListener("timeupdate", () => {
    // track furthest point reached naturally
    if (video.currentTime > maxTime) {
        maxTime = video.currentTime;
    }
});

video.addEventListener("seeking", () => {
    const buffer = 0.25;

    // allow normal playback + slight browser jitter
    if (video.currentTime <= maxTime + buffer) return;

    // block forward seeking
    video.currentTime = maxTime;
});

    video.addEventListener("seeking", () => {
        if (video.currentTime > maxTime + 0.5) {
            video.currentTime = maxTime;
        }
    });

});

</script>

</body>
</html>
