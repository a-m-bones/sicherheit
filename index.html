<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Safety Briefing</title>

<style>
body{
    font-family: Inter;
    background: #f5f5f5;
    margin: 0;
    padding: 40px;
}

.wrapper{
    max-width: 900px;
    margin: auto;
}

#title, #instruction{
    text-align: left;
}

video{
    width: 100%;
    margin-top: 20px;
    background: black;
}

/* FORCE button style (higher specificity) */
.wrapper button{
    padding: 12px 18px;
    font-size: 16px;
    cursor: pointer;

    background: #d02c22 !important;
    color: #ffffff !important;

    border: none !important;
    outline: none !important;
    border-radius: 4px;
}

.wrapper button:focus{
    outline: none !important;
}

.wrapper button:hover{
    opacity: 0.9;
}

.buttons{
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="wrapper">

    <h1 id="title"></h1>
    <p id="instruction"></p>

    <!-- IMPORTANT: NO controls attribute -->
    <video id="video" playsinline></video>

    <div class="buttons">
        <button id="backBtn"></button>
        <button id="continueBtn" style="display:none;"></button>
    </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const lang = params.get("lang") || "en";

    const content = {
        en: {
            title: "Safety Briefing",
            instruction: "Please watch the full safety video.",
            back: "Back",
            continue: "Continue",
            video: "https://res.cloudinary.com/dt0u20yez/video/upload/v1778247758/cfm_sicherheitunterweisung_en_prlc6d.mp4"
        },
        de: {
            title: "Sicherheitseinweisung",
            instruction: "Bitte vollständiges Video ansehen.",
            back: "Zurück",
            continue: "Weiter",
            video: "https://www.dropbox.com/scl/fi/ap2p8ymm96660xcuz85g0/cfm_sicherheitunterweisung_de.mp4?raw=1"
        },
        fr: {
            title: "Consignes de sécurité",
            instruction: "Veuillez regarder la vidéo complète.",
            back: "Retour",
            continue: "Continuer",
            video: "https://www.dropbox.com/scl/fi/930qstnqbesom1xv8yoao/cfm_sicherheitunterweisung_fr.mp4?raw=1"
        },
        es: {
            title: "Instrucciones de seguridad",
            instruction: "Vea el video completo.",
            back: "Atrás",
            continue: "Continuar",
            video: "https://www.dropbox.com/scl/fi/fvptb7prmw7algpt6g026/cfm_sicherheitunterweisung_esp.mp4?raw=1"
        },
        ru: {
            title: "Инструктаж",
            instruction: "Посмотрите видео полностью.",
            back: "Назад",
            continue: "Далее",
            video: "https://www.dropbox.com/scl/fi/s37a9uweq2tlyvepfub0u/cfm_sicherheitunterweisung_ru.mp4?raw=1"
        },
        hu: {
            title: "Biztonsági tájékoztató",
            instruction: "Nézze végig a videót.",
            back: "Vissza",
            continue: "Tovább",
            video: "https://www.dropbox.com/scl/fi/wjnjywu7b4but94k6v59p/cfm_sicherheitunterweisung_hu.mp4?raw=1"
        },
        tr: {
            title: "Güvenlik Talimatı",
            instruction: "Videonun tamamını izleyin.",
            back: "Geri",
            continue: "Devam",
            video: "https://www.dropbox.com/scl/fi/zjje1xx7yhg2scngwvbor/cfm_sicherheitunterweisung_tu.mp4?raw=1"
        }
    };

    const data = content[lang] || content.en;

    const video = document.getElementById("video");
    const backBtn = document.getElementById("backBtn");
    const continueBtn = document.getElementById("continueBtn");

    document.getElementById("title").innerText = data.title;
    document.getElementById("instruction").innerText = data.instruction;

    video.src = data.video;


    // unlock at end
    video.addEventListener("ended", () => {
        continueBtn.style.display = "inline-block";
    });

    // STRONG SEEK BLOCK (improved version)
    let maxTime = 0;

video.addEventListener("timeupdate", () => {
    // only update when user is naturally progressing
    if (video.currentTime > maxTime) {
        maxTime = video.currentTime;
    }
});

video.addEventListener("seeking", () => {
    const buffer = 0.3;

    // allow normal backward seeking
    if (video.currentTime <= maxTime + buffer) return;

    // block forward seeking
    requestAnimationFrame(() => {
        video.currentTime = maxTime;
    });
});

</script>

</body>
</html>
